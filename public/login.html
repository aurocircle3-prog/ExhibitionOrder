<title>Login — Expo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg">
<div class="topbar"><div class="brand"><img src="/logo.svg" alt="" style="height:22px;vertical-align:-6px;margin-right:8px">Expo Orders</div></div>
<div class="wrap" style="max-width:420px">
  <div class="card">
    <h2 style="margin-top:0" id="title">Sign in</h2>
    <p class="muted" id="companyLabel"></p>
    <div class="error" id="err"></div>
    <label>Company link <span class="muted">(only if not on your company's own address)</span></label>
    <input id="tenant" placeholder="meridian">
    <label>Login ID <span class="muted">(email or phone)</span></label>
    <input id="loginId">
    <label>Password</label>
    <input id="password" type="password">
    <button class="primary" style="width:100%;margin-top:18px" onclick="login()">Sign in</button>
    <p class="muted" style="text-align:center;margin-top:12px"><a href="/forgot-password.html">Forgot password?</a></p>
  </div>
  <p class="muted" id="versionTag" style="text-align:center;margin-top:14px;font-size:11px"></p>
</div>
<script src="/app.js"></script>
<script>
document.getElementById('tenant').value = EXO.getTenantSlug();
EXO.showVersion('versionTag');
async function login(){
  const err = document.getElementById('err'); err.style.display='none';
  const tenant = document.getElementById('tenant').value.trim();
  if (tenant) localStorage.setItem('exo_tenant', tenant);
  try {
    const body = { loginId: document.getElementById('loginId').value.trim(), password: document.getElementById('password').value };
    const data = await EXO.apiFetch('/auth/login', { method:'POST', body: JSON.stringify(body) });
    EXO.saveSession(data);
    if (data.user.role === 'client') location.href = '/client/orders.html';
    else if (data.user.role === 'staff') location.href = '/staff/order.html';
    else location.href = '/admin/dashboard.html';
  } catch(e) { err.textContent = e.message; err.style.display='block'; }
}
</script>
