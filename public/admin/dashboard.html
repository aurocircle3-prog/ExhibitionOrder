<title>Dashboard — Expo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg">
<div id="nav"></div>
<div class="wrap">
  <div class="card" id="noExhibitionsCard" style="display:none">
    <h3 style="margin-top:0">No exhibitions yet</h3>
    <p class="muted">Exhibitions are set up centrally by ExpoOrders. Contact them to get your company added to one — once you are, it'll show up here.</p>
  </div>

  <div class="tabs" id="dashTabs" style="display:none">
    <button class="tab-btn" data-dashtab="overview" onclick="switchDashTab('overview')">Overview</button>
    <button class="tab-btn" data-dashtab="completed" onclick="switchDashTab('completed')">Completed</button>
    <button class="tab-btn" data-dashtab="bestsellers" onclick="switchDashTab('bestsellers')">Best Sellers</button>
  </div>

  <div class="tab-panel" id="dashtab-overview">
    <div class="grid cols-2" id="statRow" style="margin-bottom:18px"></div>
    <h3>Current exhibitions</h3>
    <div class="grid cols-2" id="currentExhibitions"></div>
  </div>

  <div class="tab-panel" id="dashtab-completed">
    <h3 style="margin-top:0">Completed exhibitions</h3>
    <div class="grid cols-2" id="completedExhibitions"></div>
  </div>

  <div class="tab-panel" id="dashtab-bestsellers">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">
        <h3 style="margin:0">Best selling items</h3>
        <select id="bestSellersExhibition" onchange="loadBestSellers()" style="max-width:220px"></select>
      </div>
      <div id="bestSellersGrid" class="best-sellers-grid" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<div class="simple-lightbox" id="simpleLightbox" onclick="closeSimpleLightbox()">
  <img id="simpleLightboxImg" src="">
</div>

<script src="/app.js"></script>
<script>
const user = EXO.requireRole('admin');
document.getElementById('nav').innerHTML = EXO.adminNav('dashboard');
const tenantSlug = EXO.getTenantSlug();

function switchDashTab(name){
  document.querySelectorAll('#dashTabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.dashtab === name));
  document.querySelectorAll('.wrap > .tab-panel').forEach(p => p.classList.toggle('active', p.id === 'dashtab-' + name));
  if (name === 'bestsellers') loadBestSellers();
}

function statCard(label, value){
  return `<div class="card" style="text-align:center;padding:16px"><div class="muted" style="font-size:12px">${label}</div><div style="font-size:28px;font-weight:800;margin-top:4px">${value}</div></div>`;
}

function exhibitionCard(e){
  const dates = e.startDate ? `${e.startDate}${e.endDate ? ' – ' + e.endDate : ''}` : '';
  const validTillNote = e.validTill ? `<p class="muted" style="margin:2px 0">Valid till ${e.validTill}</p>` : '';
  const closedNote = e.closed ? `<p class="muted" style="margin:2px 0">Marked completed by your team</p>` : (e.status === 'completed' ? `<p class="muted" style="margin:2px 0">Access window ended</p>` : '');
  return `
    <div class="card">
      <h4 style="margin:0 0 4px">${e.name}</h4>
      <p class="muted" style="margin:2px 0">${e.location || ''}${e.location && dates ? ' · ' : ''}${dates}</p>
      ${validTillNote}${closedNote}
      <p class="muted" style="margin:8px 0">${e.itemCount} item${e.itemCount===1?'':'s'} · ${e.orderCount} order${e.orderCount===1?'':'s'}</p>
      <div class="btn-row" style="margin-top:10px">
        <button class="primary small" onclick="enterExhibition('${e.id}','${e.name.replace(/'/g,"\\'")}')">${e.status === 'current' ? 'Enter →' : 'View →'}</button>
        ${e.status === 'current'
          ? `<button class="ghost small" onclick="closeExhibition('${e.id}','${e.name.replace(/'/g,"\\'")}')">Mark completed</button>`
          : (e.closed ? `<button class="ghost small" onclick="reopenExhibition('${e.id}','${e.name.replace(/'/g,"\\'")}')">Reopen</button>` : '')}
      </div>
    </div>`;
}

async function load(){
  const [exhibitions, stats] = await Promise.all([
    EXO.apiFetch('/exhibitions'),
    EXO.apiFetch('/dashboard/stats'),
  ]);
  const current = exhibitions.filter(e => e.status === 'current');
  const completed = exhibitions.filter(e => e.status === 'completed');
  const ordersInCurrent = current.reduce((sum, e) => sum + (e.orderCount || 0), 0);

  document.getElementById('noExhibitionsCard').style.display = exhibitions.length ? 'none' : 'block';
  document.getElementById('dashTabs').style.display = exhibitions.length ? 'flex' : 'none';
  if (exhibitions.length && !document.querySelector('#dashTabs .tab-btn.active')) switchDashTab('overview');

  document.getElementById('statRow').innerHTML = statCard('Orders today', stats.ordersToday) + statCard('Orders in ongoing exhibitions', ordersInCurrent);
  document.getElementById('currentExhibitions').innerHTML = current.map(exhibitionCard).join('') || '<p class="muted">None right now.</p>';
  document.getElementById('completedExhibitions').innerHTML = completed.map(exhibitionCard).join('') || '<p class="muted">None yet.</p>';

  document.getElementById('bestSellersExhibition').innerHTML = `<option value="">All exhibitions</option>` +
    exhibitions.map(e => `<option value="${e.id}">${e.name}${e.status==='completed'?' (completed)':''}</option>`).join('');
}
async function loadBestSellers(){
  const exhibitionId = document.getElementById('bestSellersExhibition').value;
  const grid = document.getElementById('bestSellersGrid');
  const items = await EXO.apiFetch('/dashboard/best-sellers' + (exhibitionId ? '?exhibitionId=' + exhibitionId : ''));
  grid.innerHTML = items.map(it => `
    <div class="best-seller-card">
      ${it.images?.[0]
        ? `<img class="best-seller-thumb" src="${it.images[0]}" onclick="openSimpleLightbox('${it.images[0]}')" onerror="this.outerHTML='<div class=&quot;best-seller-thumb-empty&quot;></div>'">`
        : '<div class="best-seller-thumb-empty"></div>'}
      <p class="best-seller-label">${it.label}</p>
      <p class="best-seller-qty">${it.qty} sold</p>
    </div>`).join('') || '<p class="muted">No orders yet.</p>';
}
function openSimpleLightbox(src){
  document.getElementById('simpleLightboxImg').src = src;
  document.getElementById('simpleLightbox').classList.add('open');
}
function closeSimpleLightbox(){ document.getElementById('simpleLightbox').classList.remove('open'); }

function enterExhibition(id, name){
  localStorage.setItem('exo_current_exhibition_' + tenantSlug, id);
  localStorage.setItem('exo_current_exhibition_name_' + tenantSlug, name);
  location.href = '/admin/item-master.html';
}
async function closeExhibition(id, name){
  if (!confirm(`Mark "${name}" as completed? It'll move to Completed and won't be offered for new items or orders — you can reopen it any time.`)) return;
  try {
    await EXO.apiFetch('/exhibitions/' + id + '/close', { method: 'PUT' });
    EXO.toast(`"${name}" marked completed`);
    load();
  } catch (e) { EXO.toast(e.message, 'error'); }
}
async function reopenExhibition(id, name){
  try {
    await EXO.apiFetch('/exhibitions/' + id + '/reopen', { method: 'PUT' });
    EXO.toast(`"${name}" reopened`);
    load();
  } catch (e) { EXO.toast(e.message, 'error'); }
}
load();
</script>
