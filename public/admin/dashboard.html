<title>Dashboard — Exhibition Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<div id="nav"></div>
<div class="wrap">
  <div class="grid cols-3" id="stats"></div>
  <div class="card">
    <h3 style="margin-top:0">Recent orders</h3>
    <div class="table-scroll"><table>
      <thead><tr><th>Order #</th><th>Buyer</th><th>Staff</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead>
      <tbody id="orderRows"></tbody>
    </table></div>
  </div>
</div>
<script src="/app.js"></script>
<script>
const user = EXO.requireRole('admin');
document.getElementById('nav').innerHTML = EXO.adminNav('dashboard');

async function load(){
  const [items, parties, orders, staff] = await Promise.all([
    EXO.apiFetch('/items'), EXO.apiFetch('/parties'), EXO.apiFetch('/orders'), EXO.apiFetch('/staff')
  ]);
  const total = orders.reduce((s,o)=>s+o.total,0);
  document.getElementById('stats').innerHTML = `
    <div class="card"><div class="stat">${items.length}</div><div class="stat-label">Items</div></div>
    <div class="card"><div class="stat">${orders.length}</div><div class="stat-label">Orders</div></div>
    <div class="card"><div class="stat">${EXO.money(total)}</div><div class="stat-label">Total order value</div></div>
    <div class="card"><div class="stat">${parties.length}</div><div class="stat-label">Buyers captured</div></div>
    <div class="card"><div class="stat">${staff.length}</div><div class="stat-label">Staff accounts</div></div>
  `;
  document.getElementById('orderRows').innerHTML = orders.slice(0,20).map(o => `
    <tr>
      <td>${o.orderNo}</td>
      <td>${o.partyName}<br><span class="muted">${o.partyPhone}</span></td>
      <td>${o.staffName}</td>
      <td>${o.items.length}</td>
      <td>${EXO.money(o.total)}</td>
      <td>
        <select class="status-select ${o.status}" onchange="changeStatus('${o.id}', this)">
          <option value="pending" ${o.status==='pending'?'selected':''}>pending</option>
          <option value="confirmed" ${o.status==='confirmed'?'selected':''}>confirmed</option>
          <option value="cancelled" ${o.status==='cancelled'?'selected':''}>cancelled</option>
        </select>
      </td>
      <td><a href="/order/${o.shareToken}" target="_blank">View link ↗</a></td>
    </tr>`).join('') || '<tr><td colspan="7" class="muted">No orders yet</td></tr>';
}
async function changeStatus(id, select){
  const status = select.value;
  select.className = 'status-select ' + status;
  try { await EXO.apiFetch('/orders/'+id+'/status', { method:'PUT', body: JSON.stringify({ status }) }); }
  catch(e) { alert(e.message); load(); }
}
load();
</script>
