<title>Staff — Expo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg">
<div id="nav"></div>
<div class="wrap">
  <div class="card">
    <h3 style="margin-top:0">Staff accounts <span class="muted" id="usage"></span></h3>
    <p class="muted">Created internally by the admin — staff cannot self-register.</p>
    <div class="error" id="err"></div>
    <div class="table-scroll"><table>
      <thead><tr><th>Name</th><th>Login ID</th><th>Phone</th><th>Status</th><th></th></tr></thead>
      <tbody id="rows"><tr><td colspan="5" class="muted">Loading…</td></tr></tbody>
    </table></div>
  </div>
  <div class="card">
    <h3 style="margin-top:0">Add staff</h3>
    <div class="grid cols-3">
      <div><label>Name</label><input id="name"></div>
      <div>
        <label>Phone</label>
        <div style="display:flex;gap:6px">
          <input id="phoneCC" value="+91" maxlength="4" style="width:60px;flex:0 0 auto">
          <input id="phone" type="tel" inputmode="numeric" placeholder="90290 06090" style="flex:1">
        </div>
      </div>
      <div><label>Email <span class="muted">(used as login ID)</span></label><input id="email" type="email"></div>
      <div><label>Password</label><input id="password" type="password"></div>
    </div>
    <button class="primary" style="margin-top:14px" onclick="EXO.busy(this, addStaff)">Create staff login</button>
  </div>
</div>
<script src="/app.js"></script>
<script>
EXO.requireRole('admin');
document.getElementById('nav').innerHTML = EXO.adminNav('staff');

async function load(){
  const [staff, me] = await Promise.all([EXO.apiFetch('/staff'), EXO.apiFetch('/me')]);
  const activeCount = staff.filter(s => s.active).length;
  const max = me.tenant?.maxStaff;
  document.getElementById('usage').textContent = `— ${activeCount} / ${max ?? '∞'} used`;
  document.getElementById('rows').innerHTML = staff.map(s => `
    <tr>
      <td>${s.name}</td><td>${s.loginId}</td><td>${s.phone||'—'}</td>
      <td>${s.active?'Active':'<span class="muted">Disabled</span>'}</td>
      <td>
        <button class="ghost small" onclick="resetPassword('${s.id}','${s.name.replace(/'/g,"\\'")}')">Reset password</button>
        <button class="ghost small" onclick="toggle('${s.id}', ${!s.active})">${s.active?'Disable':'Enable'}</button>
        <button class="danger small" onclick="remove('${s.id}')">Delete</button>
      </td>
    </tr>`).join('') || '<tr><td colspan="5" class="muted">No staff yet</td></tr>';
}
async function resetPassword(id, name){
  const pw = prompt(`New password for ${name} (min 6 characters):`);
  if (pw === null) return; // cancelled
  if (pw.length < 6) { EXO.toast('Password must be at least 6 characters', 'error'); return; }
  try {
    await EXO.apiFetch('/staff/'+id, { method:'PUT', body: JSON.stringify({ newPassword: pw }) });
    EXO.toast(`Password updated for ${name}`);
  } catch(e) { EXO.toast(e.message, 'error'); }
}
async function addStaff(){
  const err = document.getElementById('err'); err.style.display='none';
  try {
    const phoneNum = document.getElementById('phone').value.trim();
    const body = {
      name: document.getElementById('name').value.trim(),
      phone: phoneNum ? document.getElementById('phoneCC').value.trim() + phoneNum : '',
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    };
    await EXO.apiFetch('/staff', { method:'POST', body: JSON.stringify(body) });
    document.getElementById('name').value = document.getElementById('phone').value = document.getElementById('email').value = document.getElementById('password').value = '';
    EXO.toast('Staff account created');
    load();
  } catch(e) { err.textContent = e.message; err.style.display='block'; EXO.toast('Could not add staff — see error above', 'error'); }
}
async function toggle(id, active){ await EXO.apiFetch('/staff/'+id, { method:'PUT', body: JSON.stringify({ active }) }); load(); }
async function remove(id){ if (!confirm('Delete this staff account?')) return; await EXO.apiFetch('/staff/'+id, { method:'DELETE' }); load(); }
load();
</script>
