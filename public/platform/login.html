<title>Platform Admin — Expo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg">
<div class="topbar"><div class="brand"><img src="/logo.svg" alt="" style="height:22px;vertical-align:-6px;margin-right:8px">Expo Orders</div></div>
<div class="wrap" style="max-width:400px;margin-top:60px">
  <div class="card">
    <h3 style="margin-top:0">Platform Admin</h3>
    <p class="muted" style="margin-top:-8px">ExpoOrders-only — oversight across every company, not a company login.</p>
    <div class="error" id="err"></div>
    <label>Email</label>
    <input id="email" type="email" autofocus onkeydown="if(event.key==='Enter')login()">
    <label>Password</label>
    <input id="password" type="password" onkeydown="if(event.key==='Enter')login()">
    <button class="primary" style="margin-top:14px;width:100%" onclick="login()">Sign in</button>
  </div>
  <p class="muted" id="versionTag" style="text-align:center;margin-top:14px;font-size:11px"></p>
</div>
<script>
fetch('/api/version').then(r => r.json()).then(({ version, builtAt }) => {
  document.getElementById('versionTag').textContent = `Expo Orders v${version} · built ${new Date(builtAt).toLocaleString()}`;
}).catch(() => {});
async function login(){
  const err = document.getElementById('err'); err.style.display='none';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/api/platform/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('exo_platform_token', data.token);
    localStorage.setItem('exo_platform_admin', JSON.stringify(data.admin));
    location.href = '/platform/dashboard.html';
  } catch (e) { err.textContent = e.message; err.style.display = 'block'; }
}
</script>
