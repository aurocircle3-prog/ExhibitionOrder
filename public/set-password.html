<title>Set your password — Expo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg">
<div class="topbar"><div class="brand"><img src="/logo.svg" alt="" style="height:22px;vertical-align:-6px;margin-right:8px">Expo Orders</div></div>
<div class="wrap" style="max-width:420px">
  <div class="card" id="loadingCard"><p class="muted">Checking your link…</p></div>

  <div class="card" id="formCard" style="display:none">
    <h2 style="margin-top:0" id="formTitle">Welcome<span id="welcomeName"></span> 👋</h2>
    <p class="muted" id="companyLine"></p>
    <div class="error" id="err"></div>
    <label>Set a password</label>
    <input type="password" id="password" placeholder="At least 6 characters">
    <label>Confirm password</label>
    <input type="password" id="confirm" placeholder="Type it again">
    <button class="primary" style="width:100%;margin-top:18px" onclick="submit()">Set password &amp; continue</button>
  </div>

  <div class="card" id="doneCard" style="display:none">
    <h2 style="margin-top:0">Password set ✅</h2>
    <p class="muted">You're all set — log in below.</p>
    <a class="primary" style="display:inline-block;text-decoration:none;padding:10px 20px;border-radius:8px" id="loginLink" href="/login.html">Go to login</a>
  </div>

  <div class="card" id="invalidCard" style="display:none">
    <p class="error" style="display:block" id="invalidMsg"></p>
  </div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }
async function load(){
  if (!token) return showInvalid('No setup token in the link — please use the exact link you were given.');
  try {
    const res = await fetch('/api/auth/setup-token/' + encodeURIComponent(token));
    const data = await res.json();
    if (!res.ok) return showInvalid(data.error);
    document.getElementById('formTitle').innerHTML = data.purpose === 'reset'
      ? 'Reset your password 🔒'
      : `Welcome<span id="welcomeName">, ${esc(data.name)}</span> 👋`;
    document.getElementById('companyLine').textContent = data.purpose === 'reset'
      ? `Choose a new password for your ${data.role} login at ${data.companyName}.`
      : `Setting up your admin login for ${data.companyName}.`;
    document.getElementById('loadingCard').style.display = 'none';
    document.getElementById('formCard').style.display = 'block';
  } catch (e) { showInvalid('Something went wrong checking your link. Try again in a moment.'); }
}
function showInvalid(msg){
  document.getElementById('loadingCard').style.display = 'none';
  document.getElementById('invalidCard').style.display = 'block';
  document.getElementById('invalidMsg').textContent = msg;
}
async function submit(){
  const err = document.getElementById('err'); err.style.display = 'none';
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (password.length < 6) { err.textContent = 'Password must be at least 6 characters'; err.style.display = 'block'; return; }
  if (password !== confirm) { err.textContent = "Passwords don't match"; err.style.display = 'block'; return; }
  try {
    const res = await fetch('/api/auth/set-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
    document.getElementById('formCard').style.display = 'none';
    document.getElementById('doneCard').style.display = 'block';
  } catch (e) { err.textContent = 'Something went wrong. Try again.'; err.style.display = 'block'; }
}
load();
</script>
