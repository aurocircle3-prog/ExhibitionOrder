<title>Order — Expo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg">
<script src="https://cdn.jsdelivr.net/npm/mathjs@13/lib/browser/math.js"></script>
<div class="topbar"><div class="brand" id="companyName" style="display:flex;align-items:center;gap:8px"><img src="/logo.svg" alt="" style="height:26px;width:auto;object-fit:contain;display:block"><span>Expo Orders</span></div></div>
<div class="wrap" id="content">
  <p class="muted">Loading order…</p>
</div>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" id="lightboxPrev" onclick="stepLightbox(-1)">‹</button>
  <img id="lightboxImg">
  <button class="lightbox-nav lightbox-next" id="lightboxNext" onclick="stepLightbox(1)">›</button>
  <div class="lightbox-count" id="lightboxCount"></div>
</div>

<script>
// This page is public and unauthenticated — anyone with the link can open
// it, and every value shown here (item names, field values, buyer info)
// originated from staff entry or an Excel import, not from something this
// page itself controls. Without escaping, a value like <img src=x
// onerror=...> typed into an Item Name would execute in every buyer's
// browser who opens the order link. Every interpolated string that isn't
// a literal constant needs to go through this.
function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
let lightboxImages = [], lightboxIndex = 0;
function openLightbox(images, index){
  if (!images || !images.length) return;
  lightboxImages = images; lightboxIndex = index;
  const multi = lightboxImages.length > 1;
  document.getElementById('lightboxPrev').style.display = multi ? 'block' : 'none';
  document.getElementById('lightboxNext').style.display = multi ? 'block' : 'none';
  showLightboxImage();
  document.getElementById('lightbox').classList.add('open');
}
function showLightboxImage(){
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
  document.getElementById('lightboxCount').textContent = lightboxImages.length > 1 ? `${lightboxIndex + 1} / ${lightboxImages.length}` : '';
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }
function stepLightbox(delta){
  lightboxIndex = (lightboxIndex + delta + lightboxImages.length) % lightboxImages.length;
  showLightboxImage();
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') stepLightbox(-1);
  else if (e.key === 'ArrowRight') stepLightbox(1);
  else if (e.key === 'Escape') closeLightbox();
});
// Swipe support for the fullscreen viewer — left swipe (drag right-to-left)
// goes to the next image, right swipe goes back, matching the inline
// thumbnail slider's gesture behavior.
let lightboxSwipeStartX = null;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  lightboxSwipeStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('lightbox').addEventListener('touchend', e => {
  if (lightboxSwipeStartX === null || lightboxImages.length < 2) return;
  const dx = e.changedTouches[0].clientX - lightboxSwipeStartX;
  if (Math.abs(dx) > 40) stepLightbox(dx < 0 ? 1 : -1);
  lightboxSwipeStartX = null;
});

// Shared value formatter — used everywhere a field value is displayed.
// Two things this fixes: (1) a currency symbol (₹, $, Rs.) reads naturally
// BEFORE the number, unlike a unit word like "Grams" which reads naturally
// after it; (2) rounds to the field's own configured decimal places, so a
// summed value (from row grouping, or a total) shows e.g. "23.08" instead
// of "23.080000000000002" — a classic floating-point artifact from adding
// decimal numbers in JS, not a real difference in the underlying value.
function isCurrencyUnit(unit){
  const u = (unit || '').trim();
  return /^[₹$€£¥]$/.test(u) || /^(rs\.?|inr)$/i.test(u);
}
function fmt(val, unit, decimals){
  if (val === '' || val === undefined || val === null) return '';
  if (typeof val === 'number') val = val.toFixed(decimals ?? 2); // orders from before decimals were tracked per-field fall back to a sane default rather than showing a raw floating-point artifact
  if (!unit) return String(val);
  if (isCurrencyUnit(unit)) {
    const symbol = unit.trim();
    return /^[₹$€£¥]$/.test(symbol) ? `${symbol}${val}` : `${symbol} ${val}`;
  }
  return `${val} ${unit}`;
}
// Renders header/footer/buyer field specs as compact inline chips that flow
// left-to-right on the same line, wrapping to a new line only when the
// content actually needs it — rather than one field per row regardless of
// how short they are.
function renderFieldList(fields){
  if (!fields || !fields.length) return '';
  return `<div style="display:flex;flex-wrap:wrap;gap:6px 28px">${fields.map(f => `<div class="muted">${esc(f.label)}: <b style="color:var(--ink)">${esc(fmt(f.value, f.unit, f.decimals))}</b></div>`).join('')}</div>`;
}
// Same percent-notation support as the server (see preprocessPercent there)
// — applied here too since formulas are actually EVALUATED client-side.
function preprocessPercent(expr){
  let result = expr.replace(/\(([^()]*)\)\s*%/g, '(($1)/100)');
  result = result.replace(/([A-Za-z_][A-Za-z0-9_]*|\d+(\.\d+)?)\s*%(?!\w)/g, '($1/100)');
  return result;
}

// Inline per-row image slider — items with multiple photos previously
// showed every thumbnail stacked in the same cell, which (especially after
// the images were made bigger) meant several rows just wrapped into a tall
// stack of photos instead of a clean row. Shows one photo at a time with
// prev/next arrows, swipe support, and a "1 of 3" counter; tapping the
// photo itself still opens the full-screen lightbox to flip through at a
// larger size. Each slider is tracked by a numeric ID so many independent
// sliders can coexist on one page without stepping on each other.
let sliderImagesRegistry = [];
function renderImageSlider(images, size){
  size = size || 144;
  if (!images.length) return '';
  const sliderId = sliderImagesRegistry.length;
  sliderImagesRegistry.push(images);
  return `
    <div class="img-slider" data-slider-id="${sliderId}" data-index="0" style="position:relative;display:inline-block">
      <img src="${esc(images[0])}" style="max-width:${size}px;max-height:${size}px;width:auto;height:auto;object-fit:contain;border-radius:10px;background:#f0f0f0;display:block;cursor:pointer" onclick="const i=+this.closest('.img-slider').dataset.index; openLightbox(sliderImagesRegistry[${sliderId}], i)">
    </div>
    ${images.length > 1 ? `<div class="muted" style="font-size:11px;text-align:center;margin-top:2px" id="slider-count-${sliderId}">1 of ${images.length}</div>` : ''}`;
}
function stepSlider(sliderId, delta, event){
  event?.stopPropagation();
  const el = document.querySelector(`.img-slider[data-slider-id="${sliderId}"]`);
  if (!el) return;
  const images = sliderImagesRegistry[sliderId];
  let idx = ((parseInt(el.dataset.index, 10) + delta) % images.length + images.length) % images.length;
  el.dataset.index = idx;
  el.querySelector('img').src = images[idx];
  const counter = document.getElementById(`slider-count-${sliderId}`);
  if (counter) counter.textContent = `${idx + 1} of ${images.length}`;
}
// Swipe support — delegated to the document so it keeps working across
// re-renders (pagination rebuilds the table rows) without re-attaching
// listeners to each individual slider every time.
let swipeStartX = null, swipeStartSliderId = null;
document.addEventListener('touchstart', e => {
  const slider = e.target.closest?.('.img-slider');
  if (!slider) return;
  swipeStartX = e.touches[0].clientX;
  swipeStartSliderId = slider.dataset.sliderId;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (swipeStartX === null) return;
  const slider = e.target.closest?.('.img-slider');
  if (slider && slider.dataset.sliderId === swipeStartSliderId) {
    const dx = e.changedTouches[0].clientX - swipeStartX;
    if (Math.abs(dx) > 40) stepSlider(+slider.dataset.sliderId, dx < 0 ? 1 : -1);
  }
  swipeStartX = null;
});

// Merges scanned items that share the exact same Item Name into one row —
// e.g. a necklace set scanned as separate necklace + earring items. Numeric
// field values (weight, etc.) are added together; text values are combined
// with a comma; images and remarks are combined too. Runs before either
// table renderer, so both the dynamic and legacy layouts get it for free
// without duplicating the merge logic in each one.
function groupItemsByName(items, decimalsByKey, order, columnsSnapshot){
  const orderKeys = [], groups = {};
  items.forEach(item => {
    // Variant tags are part of the identity here, not just the name — two
    // lines of "Denim Shirt" in Red/S and Red/M are different things and
    // must stay as separate rows; merging them would leave no way to say
    // which quantity was which combination. Only genuine duplicates (same
    // item, same tags) collapse together.
    const key = (item.extra?.itemName || item.label) + '::' + JSON.stringify(item.variantTags || {});
    if (!groups[key]) { groups[key] = []; orderKeys.push(key); }
    groups[key].push(item);
  });
  const formulaColumns = (columnsSnapshot || []).filter(c => c.type === 'formula');
  return orderKeys.map(key => {
    const group = groups[key];
    if (group.length === 1) return group[0]; // nothing to merge
    const merged = {
      itemId: group.map(g => g.itemId).join(','),
      label: group[0].extra?.itemName || group[0].label, // identical across the group by definition
      scannerCode: [...new Set(group.map(g => g.scannerCode).filter(Boolean))].join(', '),
      images: [...new Set(group.flatMap(g => g.images || []))],
      qty: group[0].qty, // the set's quantity — scanned components of one set share the same qty, not summed
      comment: [...new Set(group.map(g => g.comment).filter(Boolean))].join(', '),
      variantTags: group[0].variantTags, // identical across the group by the grouping key above
      extra: {},
    };
    const allKeys = new Set(group.flatMap(g => Object.keys(g.extra || {})));
    allKeys.forEach(fieldKey => {
      const values = group.map(g => g.extra?.[fieldKey]).filter(v => v !== '' && v !== undefined && v !== null);
      const allNumeric = values.length > 0 && values.every(v => typeof v === 'number');
      if (allNumeric) {
        const sum = values.reduce((s, v) => s + v, 0);
        const decimals = decimalsByKey?.[fieldKey] ?? 2;
        merged.extra[fieldKey] = Number(sum.toFixed(decimals)); // rounds away the floating-point artifact
      } else {
        merged.extra[fieldKey] = [...new Set(values.map(String))].join(', ');
      }
    });
    // A formula like "net_weight * melting / 100" breaks if evaluated
    // against the merged row above — net_weight correctly sums across the
    // set's pieces, but melting (a purity %) doesn't mean anything summed;
    // two pieces at 50% melting aren't "100% melting" together. So instead
    // of running the formula once against the (partly wrong) merged
    // fields, it's run once per ORIGINAL piece using that piece's own
    // real values, and only the final results get added together.
    if (formulaColumns.length) {
      merged.formulaTotals = {};
      formulaColumns.forEach(col => {
        let sum = 0, any = false;
        group.forEach(g => {
          const n = getNumericColumnValue(col, g, order);
          if (n !== null) { sum += n; any = true; }
        });
        if (any) merged.formulaTotals[col.id] = sum;
      });
    }
    return merged;
  });
}

const PAGE_SIZE = 10;
let allRowsHtml = [], allMobileCardsHtml = [], currentPage = 1;

async function load(){
  const token = location.pathname.split('/').pop();
  const box = document.getElementById('content');
  try {
    const res = await fetch('/api/orders/public/' + token).then(r => { if (!r.ok) throw new Error('Order not found'); return r.json(); });
    const { order, company, rowGrouping, viewHeaderFields, viewFooterFields } = res;
    const logoHtml = company.logoUrl ? `<img src="${esc(company.logoUrl)}" alt="" style="height:26px;width:auto;object-fit:contain;display:block">` : '🎪';
    document.getElementById('companyName').innerHTML = `${logoHtml}<span>${esc(company.name || 'Expo Orders')}</span>`;

    if (rowGrouping === 'itemName') {
      const decimalsByKey = {};
      (order.orderFieldsSnapshot || []).forEach(f => { if (f.decimals !== undefined) decimalsByKey[f.key] = f.decimals; });
      (order.columnsSnapshot || []).forEach(c => { if (c.type === 'field' && c.decimals !== undefined) decimalsByKey[c.fieldKey] = c.decimals; });
      order.items = groupItemsByName(order.items, decimalsByKey, order, order.columnsSnapshot);
    }

    const isDynamic = !!(order.columnsSnapshot && order.columnsSnapshot.length);
    const { headerCells, rowsArray } = isDynamic ? renderDynamicTable(order) : renderLegacyTable(order);
    allRowsHtml = rowsArray;
    currentPage = 1;

    const extraFields = order.orderFieldsSnapshot || [];
    const showImages = order.showImages !== false;
    const hasRemarks = order.items.some(i => i.comment);
    allMobileCardsHtml = renderMobileCards(order, isDynamic, extraFields, hasRemarks, showImages);

    const columnTotals = computeColumnTotals(order, isDynamic);
    const fieldTotalRows = columnTotals.map(t =>
      `<div class="cart-row" style="border-bottom:none"><span class="muted">${esc(t.label)}</span><span>${esc(fmt(t.value, t.unit, t.decimals))}</span></div>`
    ).join('');
    // "Total" type header/footer fields were sent unresolved (just a label
    // + which column) — fill in the actual number from the totals just
    // computed above, so a formula-based total works there too, same as
    // in the main totals block. "fieldtotal" entries sum a numeric Item
    // Master field directly across every item, without that field needing
    // to be a visible column at all.
    const resolveTotalFields = list => (list || [])
      .map(f => {
        if (f.type === 'total') {
          const match = columnTotals.find(t => t.columnId === f.columnId);
          return match ? { label: f.label, ...match } : { label: f.label, value: undefined };
        }
        if (f.type === 'fieldtotal') {
          let sum = 0, any = false;
          order.items.forEach(item => {
            const raw = item.extra?.[f.fieldKey];
            if (raw !== '' && raw !== undefined && raw !== null && !isNaN(Number(raw))) { sum += Number(raw); any = true; }
          });
          if (!any) return { label: f.label, value: undefined };
          return { label: f.label, value: Number(sum.toFixed(f.decimals ?? 2)), unit: f.unit, decimals: f.decimals };
        }
        return f;
      })
      .filter(f => f.value !== '' && f.value !== undefined && f.value !== null);
    const resolvedHeaderFields = resolveTotalFields(viewHeaderFields);
    const resolvedFooterFields = resolveTotalFields(viewFooterFields);

    const buyerFields = [
      { label: 'Buyer', value: order.partyName },
      order.partyContactPerson ? { label: 'Contact', value: order.partyContactPerson } : null,
      { label: 'Phone', value: order.partyPhone },
      order.partyEmail ? { label: 'Email', value: order.partyEmail } : null,
    ].filter(Boolean);

    box.innerHTML = `
      <div class="card">
        <p class="muted" style="margin:0 0 4px">Order <b>${esc(order.orderNo)}</b> · <span class="badge ${esc(order.status)}">${esc(order.status)}</span></p>
        <p class="muted" style="margin:0 0 14px">${new Date(order.createdAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</p>
        <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line)">${renderFieldList(buyerFields)}</div>
        ${resolvedHeaderFields.length ? `<div style="margin-bottom:14px">${renderFieldList(resolvedHeaderFields)}</div>` : ''}
        <div class="table-scroll desktop-order-view" id="tableViewWrap"><table class="${isDynamic ? 'dynamic-order-table' : ''}">
          <thead><tr>${headerCells}</tr></thead>
          <tbody id="orderRowsBody"></tbody>
        </table></div>
        <div class="mobile-order-view" id="orderMobileCards"></div>
        <div id="clubbedItems" style="display:none"></div>
        <div id="orderPagination" style="margin-top:10px"></div>
        ${fieldTotalRows ? `<div style="margin-top:14px;max-width:320px">${fieldTotalRows}</div>` : ''}
        ${order.remark ? `<p class="muted" style="margin-top:10px">Remark: ${esc(order.remark)}</p>` : ''}
        ${resolvedFooterFields.length ? `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line)">${renderFieldList(resolvedFooterFields)}</div>` : ''}
      </div>
      ${renderFooter(company, order)}
      ${renderPoweredByFooter(company, res.platformLogoUrl)}`;
    decideAndRenderItems(order);
  } catch (e) {
    box.innerHTML = `<div class="error" style="display:block">${esc(e.message)}</div>`;
  }
}

// Shared by the desktop table and the mobile card view below — one place
// that knows how to turn any column type into its display value, so
// formula evaluation (the trickiest part) never has to be duplicated.
// Returns the raw NUMBER behind a field/formula/qty column for one row, or
// null if it isn't numeric/computable — used both to format a single
// cell's display value and to sum up a column's total across every row,
// so the totals always match exactly what each row actually shows.
function getNumericColumnValue(col, item, order, rowIndex){
  if (col.type === 'qty') return Number(item.qty) || 0;
  if (col.type === 'field') {
    const raw = item.extra?.[col.fieldKey];
    return (raw !== '' && raw !== undefined && raw !== null && !isNaN(Number(raw))) ? Number(raw) : null;
  }
  if (col.type === 'formula') {
    // Merged/grouped rows carry a pre-computed sum (see groupItemsByName)
    // — computed once per original piece and added together, rather than
    // re-evaluating the formula against this row's (partly summed,
    // partly meaningless for things like a melting %) merged fields.
    if (item.formulaTotals && col.id in item.formulaTotals) return item.formulaTotals[col.id];
    try {
      const scope = { qty: Number(item.qty) || 0 };
      Object.entries(item.extra || {}).forEach(([key, val]) => {
        if (val !== '' && val !== undefined && val !== null && !isNaN(Number(val))) scope[key] = Number(val);
      });
      Object.entries(order.customFields || {}).forEach(([key, val]) => {
        if (!(key in scope) && val !== '' && val !== undefined && !isNaN(Number(val))) scope[key] = Number(val);
      });
      const result = math.evaluate(preprocessPercent(col.formula), scope);
      return typeof result === 'number' ? result : null;
    } catch (e) { return null; }
  }
  return null;
}

function getColumnValue(col, item, order, extraFields, rowIndex){
  if (col.type === 'serial') return String(rowIndex + 1);
  if (col.type === 'field') return esc(fmt(item.extra?.[col.fieldKey], col.unit || '', col.decimals));
  if (col.type === 'orderfield') return esc(order.customFields?.[col.fieldKey] ?? '');
  if (col.type === 'remark') return esc(item.comment || '');
  if (col.type === 'itemcode') return esc(item.scannerCode || '');
  if (col.type === 'varianttag') return esc(item.variantTags?.[col.fieldKey] || '');
  if (col.type === 'qty') return String(item.qty);
  if (col.type === 'formula') {
    const result = getNumericColumnValue(col, item, order, rowIndex);
    if (result === null) return '—';
    return Number.isInteger(result) ? String(result) : result.toFixed(2);
  }
  return '';
}

// Totals — one entry per column marked "Show total", summed across every
// row using the exact same numeric logic each row's own cell uses. Works
// for both plain Field columns and Formula columns, unlike the old
// mechanism which only ever worked for a checkbox on the Order Form.
function computeColumnTotals(order, isDynamic){
  const extraFields = order.orderFieldsSnapshot || [];
  if (!isDynamic) {
    // Legacy layout (no custom columns configured) — falls back to
    // whatever was computed server-side at order creation, for orders
    // placed before this became a per-column, formula-aware setting.
    return Object.entries(order.fieldTotals || {}).map(([key, val]) => {
      const f = extraFields.find(x => x.key === key);
      return { columnId: key, label: `Total ${f ? f.label : key}`, value: val, unit: f?.unit, decimals: f?.decimals };
    });
  }
  return (order.columnsSnapshot || []).filter(c => c.showTotal).map(col => {
    let sum = 0;
    order.items.forEach((item, idx) => {
      const num = getNumericColumnValue(col, item, order, idx);
      if (num !== null) sum += num;
    });
    const decimals = col.decimals ?? 2;
    return { columnId: col.id, label: `Total ${col.label}`, value: Number(sum.toFixed(decimals)), unit: col.unit, decimals: col.decimals };
  });
}

// Mobile view — a wide table with many columns just becomes a horizontally
// scrolling mess on a phone. Instead: Sr. No. and Image always show as
// their own compact columns (not configurable — these two are the anchor
// of the layout regardless of what else is set up), and every other
// configured column collapses into a single "Details" column, one
// "Label - Value" line per row, matching how this reads naturally on a
// small screen.
function renderMobileCards(order, isDynamic, extraFields, hasRemarks, showImages){
  return order.items.map((item, rowIndex) => {
    const imgs = item.images || (item.image ? [item.image] : []);
    let detailLines;
    if (isDynamic) {
      detailLines = order.columnsSnapshot
        .filter(col => col.type !== 'serial' && col.type !== 'images')
        .map(col => ({ label: esc(col.label), value: getColumnValue(col, item, order, extraFields, rowIndex) }));
    } else {
      detailLines = [
        { label: 'Item', value: esc(item.label) },
        ...extraFields.map(f => ({ label: esc(f.label), value: esc(fmt(item.extra?.[f.key], f.unit, f.decimals)) })),
        ...(hasRemarks ? [{ label: 'Remark', value: esc(item.comment || '') }] : []),
        { label: 'Qty', value: String(item.qty) },
      ];
    }
    const detailsHtml = detailLines.map(d => `<div><span class="muted">${d.label}</span> - <b style="color:var(--ink)">${d.value ?? ''}</b></div>`).join('');
    return `
      <div class="mobile-order-row">
        <div class="mobile-img">${showImages ? renderImageSlider(imgs, 100) : ''}</div>
        <div class="mobile-details">${detailsHtml}</div>
      </div>`;
  });
}

// 10 rows per page — orders with a lot of items were rendering as one very
// long table; this keeps the page manageable to scroll through, especially
// on a phone. Just re-slices the already-rendered row HTML and updates the
// tbody in place, so paging doesn't re-fetch or re-build anything.
// Clubbed variant layout — used automatically whenever an order actually
// has variant tags (garment-style companies only; every other order keeps
// using the normal table/mobile-card view, completely unaffected). Groups
// by item first, then by the first variant tag (color), then spreads the
// second tag (size) as quantity chips — so one photo covers every
// color/size combination of that item instead of repeating per row.
function decideAndRenderItems(order){
  const items = order.items || [];
  const hasTags = items.some(it => it.variantTags && Object.keys(it.variantTags).length);
  if (!hasTags) { renderTablePage(); return; }
  document.getElementById('tableViewWrap').style.display = 'none';
  document.getElementById('orderMobileCards').style.display = 'none';
  document.getElementById('orderPagination').innerHTML = '';
  document.getElementById('clubbedItems').style.display = 'block';
  renderClubbedItems(items, order);
}
function buildClubbedGroups(items){
  const groups = {}, order = [];
  items.forEach(it => {
    const tags = it.variantTags || {};
    const tagKeys = Object.keys(tags); // insertion order matches the tenant's own category order
    const primaryVal = tagKeys[0] ? tags[tagKeys[0]] : null;
    const secondaryVal = tagKeys[1] ? tags[tagKeys[1]] : null;
    const cleanLabel = it.extra?.itemName || String(it.label || '').replace(/\s*\([^)]*\)\s*$/, '');
    const itemKey = cleanLabel + '::' + it.itemId;
    if (!groups[itemKey]) { groups[itemKey] = { label: cleanLabel, code: it.scannerCode, images: it.images || [], colors: {}, colorOrder: [], total: 0, lines: [] }; order.push(itemKey); }
    const g = groups[itemKey];
    g.lines.push(it);
    const colorKey = primaryVal || '';
    if (!g.colors[colorKey]) { g.colors[colorKey] = { sizes: {}, sizeOrder: [] }; g.colorOrder.push(colorKey); }
    const c = g.colors[colorKey];
    const sizeKey = secondaryVal || 'Qty';
    if (!(sizeKey in c.sizes)) { c.sizes[sizeKey] = 0; c.sizeOrder.push(sizeKey); }
    c.sizes[sizeKey] += Number(it.qty) || 0;
    g.total += Number(it.qty) || 0;
  });
  return order.map(k => groups[k]);
}
// Any configured column that isn't itself a tag/qty/serial — MRP, a
// formula, a remark, another Item Master field. These don't vary by
// color/size for a given style (MRP is MRP regardless of size), so they
// show once per card rather than once per chip. The one exception is a
// formula column: since it can depend on qty, it's summed across every
// line in the group — same "per line, then add" principle as Show Total
// elsewhere, so a weight- or amount-type formula still reflects the
// item's full clubbed quantity, not just its first line.
function extraCardFields(group, order){
  return (order.columnsSnapshot || [])
    .filter(c => !['varianttag', 'qty', 'serial', 'images', 'itemcode'].includes(c.type))
    .map(col => {
      let value;
      if (col.type === 'formula') {
        let sum = 0, any = false;
        group.lines.forEach(line => { const n = getNumericColumnValue(col, line, order); if (n !== null) { sum += n; any = true; } });
        value = any ? (Number.isInteger(sum) ? String(sum) : sum.toFixed(2)) : null;
      } else {
        value = getColumnValue(col, group.lines[0], order, null, 0);
      }
      return value ? { label: esc(col.label), value } : null;
    })
    .filter(Boolean);
}
function tagChipsHtml(g){
  return g.colorOrder.map(colorKey => `
    ${colorKey ? `<p class="clubbed-color-label">${esc(colorKey)}</p>` : ''}
    <div class="clubbed-size-chips">
      ${g.colors[colorKey].sizeOrder.map(sizeKey => `<span class="clubbed-size-chip">${sizeKey === 'Qty' ? '' : esc(sizeKey) + ' '}×${g.colors[colorKey].sizes[sizeKey]}</span>`).join('')}
    </div>`).join('');
}
function renderClubbedItems(items, order){
  const groups = buildClubbedGroups(items);
  // Every other configured column (MRP, formula, etc.) — qty is handled
  // separately below as the group's clubbed total, not per-line.
  const otherCols = (order.columnsSnapshot || []).filter(c => !['varianttag', 'qty', 'serial', 'images', 'itemcode'].includes(c.type));

  const desktopRows = groups.map(g => `
    <tr>
      <td>
        <div style="display:flex;gap:10px;align-items:flex-start">
          ${g.images.length ? renderImageSlider(g.images, 64) : ''}
          <div>
            <p style="margin:0;font-weight:600">${esc(g.label)}</p>
            ${g.code ? `<p class="muted" style="margin:2px 0 0;font-size:12px">${esc(g.code)}</p>` : ''}
          </div>
        </div>
      </td>
      <td>${tagChipsHtml(g)}</td>
      ${otherCols.map(col => `<td>${getColumnValue(col, g.lines[0], order, null, 0) || ''}</td>`).join('')}
      <td style="font-weight:600">${g.total}</td>
    </tr>`).join('');

  const mobileCards = groups.map(g => {
    const extras = extraCardFields(g, order);
    return `
    <div class="clubbed-card">
      <div class="clubbed-photo-wrap">${g.images.length ? renderImageSlider(g.images, 90) : '<div class="clubbed-photo"></div>'}</div>
      <div class="clubbed-header">
        <p style="margin:0;font-weight:600">${esc(g.label)}</p>
        ${g.code ? `<p class="muted" style="margin:2px 0 0;font-size:12px">${esc(g.code)}</p>` : ''}
        ${extras.length ? `<p class="muted" style="margin:4px 0 0;font-size:12px">${extras.map(e => `${e.label}: ${e.value}`).join(' · ')}</p>` : ''}
      </div>
      <div class="clubbed-groups">
        ${tagChipsHtml(g)}
        <div class="clubbed-total"><span class="muted">Total qty</span><span style="font-weight:600">${g.total}</span></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('clubbedItems').innerHTML = `
    <div class="table-scroll desktop-order-view"><table>
      <thead><tr><th>Item</th><th>Tags</th>${otherCols.map(c => `<th>${esc(c.label)}</th>`).join('')}<th>Qty</th></tr></thead>
      <tbody>${desktopRows}</tbody>
    </table></div>
    <div class="mobile-order-view">${mobileCards}</div>`;
}
function renderTablePage(){
  const totalPages = Math.max(1, Math.ceil(allRowsHtml.length / PAGE_SIZE));
  currentPage = Math.min(Math.max(1, currentPage), totalPages);
  const start = (currentPage - 1) * PAGE_SIZE;
  document.getElementById('orderRowsBody').innerHTML = allRowsHtml.slice(start, start + PAGE_SIZE).join('');
  document.getElementById('orderMobileCards').innerHTML = allMobileCardsHtml.slice(start, start + PAGE_SIZE).join('');
  const pager = document.getElementById('orderPagination');
  if (totalPages <= 1) { pager.innerHTML = ''; return; }
  pager.innerHTML = `
    <div class="btn-row" style="justify-content:center">
      <button class="ghost small" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>
      <span class="muted">Page ${currentPage} of ${totalPages}</span>
      <button class="ghost small" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>
    </div>`;
}
function goToPage(n){
  currentPage = n;
  renderTablePage();
  document.getElementById('orderRowsBody').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Company details footer — every field is independently optional, since the
// company chooses which of these (if any) to publish on the buyer link.
// Simple, generic icon glyphs (not reproductions of any brand's actual
// logo mark — just conventionally recognizable shapes) so social links
// read as tappable icons rather than plain text.
const SOCIAL_ICONS = {
  whatsapp: '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2a10 10 0 00-8.6 15.1L2 22l5.1-1.3A10 10 0 1012 2zm0 18.2a8.2 8.2 0 01-4.2-1.1l-.3-.2-3.1.8.8-3-.2-.3A8.2 8.2 0 1112 20.2z"/><path d="M9.1 7.4c-.2-.5-.4-.5-.6-.5h-.5c-.2 0-.5.1-.7.4-.3.3-1 1-1 2.3s1 2.7 1.1 2.9c.1.2 2 3 4.7 4.2 2.3.9 2.8.7 3.3.7.5-.1 1.6-.7 1.8-1.3.2-.5.2-1 .1-1.1-.1-.1-.2-.2-.5-.3-.3-.2-1.6-.8-1.9-.9-.2-.1-.4-.1-.6.1-.2.2-.7 1-.9 1.1-.2.2-.3.2-.6.1-.3-.2-1.2-.4-2.2-1.4-.8-.7-1.4-1.7-1.5-1.9-.2-.3 0-.5.1-.6l.4-.4c.1-.2.2-.3.3-.4.1-.2 0-.4 0-.5-.1-.2-.5-1.2-.7-1.6z"/></svg>',
  instagram: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.3" cy="6.7" r="1.1" fill="currentColor" stroke="none"/></svg>',
  facebook: '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M14 21v-8h2.7l.4-3.3H14V7.6c0-1 .3-1.6 1.7-1.6H17V3.1C16.7 3 15.7 3 14.6 3 12.3 3 10.7 4.4 10.7 7v2.7H8V13h2.7v8h3.3z"/></svg>',
  twitter: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 4l16 16M20 4L4 20"/></svg>',
  youtube: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="4"/><path d="M10 9.3l6 2.7-6 2.7z" fill="currentColor" stroke="none"/></svg>',
  website: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="4" ry="9"/><path d="M3 12h18"/></svg>',
};
function renderFooter(company, order){
  const f = company.footer || {};
  const hasContent = f.address || f.gstNumber || f.whatsappNumber || f.instagram || f.facebook || f.twitter || f.youtube || f.website;
  if (!hasContent) return '';
  const waMessageTemplate = f.whatsappMessage || 'Would like to discuss about order No – {orderNo}';
  const waMessage = waMessageTemplate.replace(/\{orderNo\}/g, order?.orderNo || '');
  const socialLinks = [
    f.whatsappNumber && { key: 'whatsapp', label: 'WhatsApp', url: `https://wa.me/${f.whatsappNumber.replace(/\D/g, '')}?text=${encodeURIComponent(waMessage)}` },
    f.instagram && { key: 'instagram', label: 'Instagram', url: f.instagram.startsWith('http') ? f.instagram : `https://instagram.com/${f.instagram.replace(/^@/, '')}` },
    f.facebook && { key: 'facebook', label: 'Facebook', url: f.facebook.startsWith('http') ? f.facebook : `https://facebook.com/${f.facebook}` },
    f.twitter && { key: 'twitter', label: 'Twitter/X', url: f.twitter.startsWith('http') ? f.twitter : `https://twitter.com/${f.twitter.replace(/^@/, '')}` },
    f.youtube && { key: 'youtube', label: 'YouTube', url: f.youtube.startsWith('http') ? f.youtube : `https://youtube.com/${f.youtube}` },
    f.website && { key: 'website', label: 'Website', url: f.website.startsWith('http') ? f.website : `https://${f.website}` },
  ].filter(Boolean);
  return `
    <div class="card" style="text-align:center;margin-top:16px">
      ${f.address ? `<p class="muted" style="margin:4px 0">${esc(f.address)}</p>` : ''}
      ${f.gstNumber ? `<p class="muted" style="margin:4px 0">GSTIN: ${esc(f.gstNumber)}</p>` : ''}
      ${socialLinks.length ? `<div style="margin-top:10px">${socialLinks.map(s => `<a href="${esc(s.url)}" target="_blank" title="${s.label}" aria-label="${s.label}" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--bg);color:var(--brand);margin:0 5px">${SOCIAL_ICONS[s.key]}</a>`).join('')}</div>` : ''}
    </div>`;
}
// Copyright + "Powered by" credit — always shown regardless of whether
// the company's own footer (address/social/etc.) is configured, since
// this isn't the company's content, it's ExpoOrders' own attribution.
function renderPoweredByFooter(company, platformLogoUrl){
  const year = new Date().getFullYear();
  const logoHtml = platformLogoUrl
    ? `<img src="${esc(platformLogoUrl)}" alt="" style="height:16px;width:auto;object-fit:contain;vertical-align:-3px;margin-left:4px">`
    : '';
  return `
    <div style="text-align:center;margin-top:18px;padding-top:14px">
      <p class="muted" style="margin:0;font-size:12px">© ${year} ${esc(company.name || '')}. All rights reserved.</p>
      <a href="https://expoorders.com" target="_blank" class="muted" style="display:inline-flex;align-items:center;margin-top:4px;font-size:12px;text-decoration:none">Powered by ExpoOrders${logoHtml}</a>
    </div>`;
}

// Original fixed layout — still used for any order placed before the
// tenant configured a custom Order View Layout (or if they never do).
function renderLegacyTable(order){
  const extraFields = order.orderFieldsSnapshot || [];
  const showImages = order.showImages !== false;
  const hasRemarks = order.items.some(i => i.comment);

  const headerCells = (showImages ? '<th>Photo</th>' : '') + '<th>Item</th>'
    + extraFields.map(f => `<th>${esc(f.label)}</th>`).join('')
    + (hasRemarks ? '<th>Remark</th>' : '') + '<th>Qty</th>';

  const rowsArray = order.items.map(i => {
    const imgs = i.images || (i.image ? [i.image] : []);
    const photoCell = showImages ? `<td>${renderImageSlider(imgs)}</td>` : '';
    const extraCells = extraFields.map(f => `<td>${esc(fmt(i.extra?.[f.key], f.unit, f.decimals))}</td>`).join('');
    const remarkCell = hasRemarks ? `<td>${esc(i.comment || '')}</td>` : '';
    return `<tr>${photoCell}<td>${esc(i.label)}</td>${extraCells}${remarkCell}<td>${i.qty}</td></tr>`;
  });

  return { headerCells, rowsArray };
}

// Custom column layout, built in Settings > Order View Layout. Each column
// has its own width in characters — applied as CSS `ch` units, which makes
// "wrap to the next line past this width" free: the browser already does
// that for any text wider than a fixed-character-width cell.
function renderDynamicTable(order){
  const extraFields = order.orderFieldsSnapshot || [];
  const widthStyle = w => `style="width:${w}ch"`;

  const headerCells = order.columnsSnapshot.map(col => `<th ${widthStyle(col.width)}>${esc(col.label)}</th>`).join('');

  const rowsArray = order.items.map((item, rowIndex) => {
    const cells = order.columnsSnapshot.map(col => {
      if (col.type === 'images') {
        const imgs = item.images || (item.image ? [item.image] : []);
        return `<td ${widthStyle(col.width)}>${renderImageSlider(imgs)}</td>`;
      }
      return `<td ${widthStyle(col.width)}>${getColumnValue(col, item, order, extraFields, rowIndex)}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  });

  return { headerCells, rowsArray };
}
load();
</script>
