<title>Orders — Expo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg">
<div id="nav"></div>
<div class="wrap">
  <div class="card">
    <h3 style="margin-top:0" id="heading">Orders</h3>
    <div class="table-scroll"><table>
      <thead><tr><th>Order #</th><th>Buyer</th><th>Staff</th><th>Items</th><th>Status</th><th></th></tr></thead>
      <tbody id="rows"><tr><td colspan="6" class="muted">Loading…</td></tr></tbody>
    </table></div>
  </div>
</div>
<script src="/app.js"></script>
<script>
const user = EXO.requireRole('admin','staff');
document.getElementById('nav').innerHTML = user.role === 'admin' ? EXO.adminNav('orders') : EXO.staffNav('orders');
document.getElementById('heading').textContent = user.role === 'admin' ? 'All orders' : 'My orders';
async function load(){
  const exhibitionId = EXO.currentExhibition()?.id;
  const orders = await EXO.apiFetch('/orders' + (exhibitionId ? '?exhibitionId=' + exhibitionId : ''));
  document.getElementById('rows').innerHTML = orders.map(o => `
    <tr>
      <td>${o.orderNo}</td>
      <td>${o.partyName}<br><span class="muted">${o.partyPhone}</span></td>
      <td>${o.staffName}</td>
      <td>${o.items.length}</td>
      <td>
        ${user.role === 'admin' ? `
        <select class="status-select ${o.status}" onchange="changeStatus('${o.id}', this)">
          <option value="pending" ${o.status==='pending'?'selected':''}>pending</option>
          <option value="confirmed" ${o.status==='confirmed'?'selected':''}>confirmed</option>
          <option value="cancelled" ${o.status==='cancelled'?'selected':''}>cancelled</option>
        </select>` : `<span class="badge ${o.status}">${o.status}</span>`}
      </td>
      <td>
        ${o.status === 'pending' ? `<a href="/staff/order-edit.html?id=${o.id}">Edit</a> · ` : ''}<a href="${o.shareUrl}" target="_blank">View link ↗</a>${user.role === 'admin' ? ` · <a href="#" onclick="deleteOrder('${o.id}','${o.orderNo}');return false;" style="color:var(--danger)">Delete</a>` : ''}
      </td>
    </tr>`).join('') || '<tr><td colspan="6" class="muted">No orders yet — go take one!</td></tr>';
}
async function deleteOrder(id, orderNo){
  if (!confirm(`Delete order ${orderNo}? This removes it from every list and report, and the buyer's link will stop working. This cannot be undone.`)) return;
  try {
    await EXO.apiFetch('/orders/'+id, { method: 'DELETE' });
    EXO.toast(`Order ${orderNo} deleted`);
    load();
  } catch (e) { EXO.toast(e.message, 'error'); }
}
async function changeStatus(id, select){
  const status = select.value;
  select.className = 'status-select ' + status;
  try { await EXO.apiFetch('/orders/'+id+'/status', { method:'PUT', body: JSON.stringify({ status }) }); }
  catch(e) { EXO.toast(e.message, 'error'); load(); }
}
(async function(){
  if (!(await EXO.ensureExhibitionSelected())) return;
  document.getElementById('nav').innerHTML = user.role === 'admin' ? EXO.adminNav('orders') : EXO.staffNav('orders'); // re-render now the switcher has something to show
  load();
})();
</script>
