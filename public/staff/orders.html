<title>Orders — Exhibition Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<div id="nav"></div>
<div class="wrap">
  <div class="card">
    <h3 style="margin-top:0" id="heading">Orders</h3>
    <div class="table-scroll"><table>
      <thead><tr><th>Order #</th><th>Buyer</th><th>Staff</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table></div>
  </div>
</div>
<script src="/app.js"></script>
<script>
const user = EXO.requireRole('admin','staff');
document.getElementById('nav').innerHTML = user.role === 'admin' ? EXO.adminNav('orders') : EXO.staffNav('orders');
document.getElementById('heading').textContent = user.role === 'admin' ? 'All orders' : 'My orders';
(async function(){
  const orders = await EXO.apiFetch('/orders');
  document.getElementById('rows').innerHTML = orders.map(o => `
    <tr>
      <td>${o.orderNo}</td>
      <td>${o.partyName}<br><span class="muted">${o.partyPhone}</span></td>
      <td>${o.staffName}</td>
      <td>${o.items.length}</td>
      <td>${EXO.money(o.total)}</td>
      <td><span class="badge ${o.status}">${o.status}</span></td>
      <td><a href="/order/${o.shareToken}" target="_blank">View link ↗</a></td>
    </tr>`).join('') || '<tr><td colspan="7" class="muted">No orders yet — go take one!</td></tr>';
})();
</script>
