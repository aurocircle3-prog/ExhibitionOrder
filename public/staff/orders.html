<title>Orders — Expo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg">
<div id="nav"></div>
<div class="wrap">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">
      <h3 style="margin:0" id="heading">Orders</h3>
      <p class="muted" id="filterNote" style="display:none;margin:0"></p>
    </div>
    <div class="table-scroll"><table>
      <thead><tr><th>Order #</th><th>Buyer</th><th id="exhibitionHeader" style="display:none">Exhibition</th><th>Staff</th><th>Items</th><th>Status</th><th></th></tr></thead>
      <tbody id="rows"><tr><td colspan="7" class="muted">Loading…</td></tr></tbody>
    </table></div>
  </div>
</div>
<script src="/app.js"></script>
<script>
const user = EXO.requireRole('admin','staff');
document.getElementById('nav').innerHTML = user.role === 'admin' ? EXO.adminNav('orders') : EXO.staffNav('orders');
document.getElementById('heading').textContent = user.role === 'admin' ? 'All orders' : 'My orders';

// A ?status= and/or ?date=today deep link (e.g. from a Dashboard stat
// card) is treated as an explicit cross-exhibition request — it shows
// matching orders from EVERY exhibition, with an Exhibition column added,
// rather than being scoped to whatever single exhibition happens to be
// "current" in this browser. Without this, clicking a Dashboard stat card
// would only ever show orders from one arbitrary exhibition, silently
// hiding matches from every other one.
const params = new URLSearchParams(location.search);
const statusFilter = params.get('status') || '';
const dateFilter = params.get('date') || '';
const isFiltered = !!(statusFilter || dateFilter);
let tenantStatuses = ['pending', 'confirmed', 'cancelled']; // overwritten by /me once loaded; this is just the pre-load default

if (isFiltered) {
  const bits = [];
  if (statusFilter) bits.push(`status "${statusFilter}"`);
  if (dateFilter === 'today') bits.push('placed today');
  const note = document.getElementById('filterNote');
  note.innerHTML = `Showing ${bits.join(', ')}, across every exhibition — <a href="/staff/orders.html">Clear filter</a>`;
  note.style.display = 'block';
  document.getElementById('exhibitionHeader').style.display = '';
}

function buildQuery(params){
  const parts = Object.entries(params).filter(([, v]) => v).map(([k, v]) => `${k}=${encodeURIComponent(v)}`);
  return parts.length ? '?' + parts.join('&') : '';
}

async function load(){
  const exhibitionId = isFiltered ? '' : EXO.currentExhibition()?.id;
  const [me, orders, exhibitions] = await Promise.all([
    EXO.apiFetch('/me'),
    EXO.apiFetch('/orders' + buildQuery({ exhibitionId, status: statusFilter, date: dateFilter })),
    isFiltered ? EXO.apiFetch('/exhibitions') : Promise.resolve([]),
  ]);
  tenantStatuses = (me.tenant?.orderStatuses && me.tenant.orderStatuses.length) ? me.tenant.orderStatuses : tenantStatuses;
  const exhibitionById = {}; exhibitions.forEach(e => { exhibitionById[e.id] = e; });
  document.getElementById('rows').innerHTML = orders.map(o => `
    <tr>
      <td>${o.orderNo}</td>
      <td>${o.partyName}<br><span class="muted">${o.partyPhone}</span></td>
      ${isFiltered ? `<td>${exhibitionById[o.exhibitionId]?.name || '<span class="muted">—</span>'}</td>` : ''}
      <td>${o.staffName}</td>
      <td>${o.items.length}</td>
      <td>
        ${user.role === 'admin' ? `
        <select class="status-select ${o.status}" onchange="changeStatus('${o.id}', this)">
          ${tenantStatuses.map(s => `<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
        </select>` : `<span class="badge ${o.status}">${o.status}</span>`}
      </td>
      <td>
        ${o.status === 'pending' ? `<a href="/staff/order-edit.html?id=${o.id}">Edit</a> · ` : ''}<a href="${o.shareUrl}" target="_blank">View link ↗</a>${user.role === 'admin' ? ` · <a href="#" onclick="deleteOrder('${o.id}','${o.orderNo}');return false;" style="color:var(--danger)">Delete</a>` : ''}
      </td>
    </tr>`).join('') || `<tr><td colspan="${isFiltered ? 7 : 6}" class="muted">No matching orders — go take one!</td></tr>`;
}
async function deleteOrder(id, orderNo){
  if (!confirm(`Delete order ${orderNo}? This removes it from every list and report, and the buyer's link will stop working. This cannot be undone.`)) return;
  try {
    await EXO.apiFetch('/orders/'+id, { method: 'DELETE' });
    EXO.toast(`Order ${orderNo} deleted`);
    load();
  } catch (e) { EXO.toast(e.message, 'error'); }
}
async function changeStatus(id, select){
  const status = select.value;
  select.className = 'status-select ' + status;
  try { await EXO.apiFetch('/orders/'+id+'/status', { method:'PUT', body: JSON.stringify({ status }) }); }
  catch(e) { EXO.toast(e.message, 'error'); load(); }
}
(async function(){
  // A filtered deep-link deliberately spans every exhibition, so it
  // doesn't need one "current" exhibition selected first — only the
  // normal unscoped view does.
  if (!isFiltered && !(await EXO.ensureExhibitionSelected())) return;
  document.getElementById('nav').innerHTML = user.role === 'admin' ? EXO.adminNav('orders') : EXO.staffNav('orders'); // re-render now the switcher has something to show
  load();
})();
</script>
