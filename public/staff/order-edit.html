<title>Edit Order — Expo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg">
<div id="nav"></div>
<div class="wrap">
  <div class="card" id="loadingCard">
    <p class="muted">Loading order…</p>
  </div>

  <div class="card" id="editCard" style="display:none">
    <h3 style="margin-top:0">Edit order <span id="orderNo" class="muted"></span></h3>
    <p class="muted" style="margin-top:-8px">Buyer: <b id="partyName"></b> — <span id="partyPhone"></span> <span class="muted">(buyer can't be changed here — cancel and re-create if it's wrong)</span></p>
    <div class="error" id="editErr"></div>

    <label>Scan or type item code to add</label>
    <input id="scanCode" placeholder="Scan or type item code, then Enter" onkeydown="if(event.key==='Enter')lookupItem()">

    <div id="cartRows" style="margin-top:14px"></div>
    <div id="orderDetailFields"></div>

    <label style="margin-top:14px">Remark <span class="muted">(optional)</span></label>
    <textarea id="remark" rows="2"></textarea>
    <div class="btn-row" style="margin-top:14px">
      <button class="primary" onclick="saveOrder()">Save changes</button>
      <button class="ghost" onclick="location.href='/staff/orders.html'">Cancel</button>
    </div>
  </div>

  <div class="card" id="blockedCard" style="display:none">
    <p class="error" style="display:block" id="blockedMsg"></p>
    <button class="ghost" onclick="location.href='/staff/orders.html'">Back to orders</button>
  </div>
</div>
<script src="/app.js"></script>
<script>
const currentUser = EXO.requireRole('admin','staff');
document.getElementById('nav').innerHTML = currentUser.role === 'admin' ? EXO.adminNav('orders') : EXO.staffNav('orders');

let order = null, cart = [], orderFields = [], orderCustomFields = [], orderDetailValues = {};
const orderId = new URLSearchParams(location.search).get('id');

function showBlocked(msg){
  document.getElementById('loadingCard').style.display = 'none';
  document.getElementById('blockedCard').style.display = 'block';
  document.getElementById('blockedMsg').textContent = msg;
}

async function load(){
  if (!orderId) return showBlocked('No order specified.');
  try {
    const me = await EXO.apiFetch('/me');
    orderFields = me.tenant?.orderFields || [];
    orderCustomFields = me.tenant?.orderCustomFields || [];
    order = await EXO.apiFetch('/orders/' + orderId);
  } catch (e) { return showBlocked(e.message); }
  if (order.status !== 'pending') return showBlocked('Only pending orders can be edited — this order is ' + order.status + '.');

  // Existing order lines already carry their own saved extra/comment values —
  // edit those in place rather than re-pulling fresh item master defaults.
  cart = order.items.map(i => ({ itemId: i.itemId, label: i.label, code: i.scannerCode, qty: i.qty, extra: { ...(i.extra || {}) }, comment: i.comment || '' }));
  orderDetailValues = { ...(order.customFields || {}) };
  document.getElementById('orderNo').textContent = '· ' + order.orderNo;
  document.getElementById('partyName').textContent = order.partyName;
  document.getElementById('partyPhone').textContent = order.partyPhone;
  document.getElementById('remark').value = order.remark || '';
  renderCart();
  renderOrderDetailFields();
  document.getElementById('loadingCard').style.display = 'none';
  document.getElementById('editCard').style.display = 'block';
  document.getElementById('scanCode').focus();
}
function renderOrderDetailFields(){
  const box = document.getElementById('orderDetailFields');
  if (!orderCustomFields.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<label style="margin-top:14px">Order details</label>` + orderCustomFields.map(f => `
    <div style="margin-top:6px">
      <label class="muted" style="font-weight:400">${f.label}</label>
      <input type="${f.type==='number'?'number':'text'}" ${f.type==='number'?`step="${1/Math.pow(10, f.decimals ?? 2)}"`:''}
        value="${orderDetailValues[f.key] ?? ''}" oninput="orderDetailValues['${f.key}']=this.value">
    </div>`).join('');
}

async function lookupItem(){
  const err = document.getElementById('editErr'); err.style.display = 'none';
  const code = document.getElementById('scanCode').value.trim();
  document.getElementById('scanCode').value = '';
  if (!code) return;
  try {
    const item = await EXO.apiFetch('/items/scan/' + encodeURIComponent(code));
    addToCart(item);
  } catch (e) { err.textContent = e.message; err.style.display = 'block'; }
}
function addToCart(item){
  const existing = cart.find(c => c.itemId === item.id);
  if (existing) { existing.qty += 1; renderCart(); return; }
  const extra = {};
  orderFields.forEach(f => { extra[f.key] = item.fields?.[f.key] ?? ''; });
  cart.push({ itemId: item.id, label: item.fields.productName || item.scannerCode, code: item.scannerCode, qty: 1, extra, comment: '' });
  renderCart();
}
function changeQty(id, delta){
  const line = cart.find(c => c.itemId === id);
  line.qty = Math.max(1, line.qty + delta);
  renderCart();
}
function updateExtra(id, key, value){ const line = cart.find(c => c.itemId === id); if (line) line.extra[key] = value; }
function updateComment(id, value){ const line = cart.find(c => c.itemId === id); if (line) line.comment = value; }
function removeLine(id){ cart = cart.filter(c => c.itemId !== id); renderCart(); }
function renderCart(){
  if (!cart.length) { document.getElementById('cartRows').innerHTML = '<p class="muted">No items — add at least one below</p>'; return; }
  const fieldCols = orderFields.map(f => `<th>${f.label}${f.unit ? ' ('+f.unit+')' : ''}</th>`).join('');
  const rows = cart.map(c => `
    <tr>
      <td>${c.label}<br><span class="muted">${c.code}</span></td>
      ${orderFields.map(f => `<td><input style="width:80px" value="${c.extra?.[f.key] ?? ''}" oninput="updateExtra('${c.itemId}','${f.key}',this.value)"></td>`).join('')}
      <td><input style="width:140px" placeholder="Optional note" value="${c.comment || ''}" oninput="updateComment('${c.itemId}',this.value)"></td>
      <td class="qty-ctrl"><button class="ghost small" onclick="changeQty('${c.itemId}',-1)">-</button>${c.qty}<button class="ghost small" onclick="changeQty('${c.itemId}',1)">+</button></td>
      <td><button class="danger small" onclick="removeLine('${c.itemId}')">✕</button></td>
    </tr>`).join('');
  document.getElementById('cartRows').innerHTML = `
    <div class="table-scroll"><table>
      <thead><tr><th>Item</th>${fieldCols}<th>Comment</th><th>Qty</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

async function saveOrder(){
  const err = document.getElementById('editErr'); err.style.display = 'none';
  if (!cart.length) { err.textContent = 'Add at least one item'; err.style.display = 'block'; return; }
  try {
    await EXO.apiFetch('/orders/' + orderId, {
      method: 'PUT',
      body: JSON.stringify({
        items: cart.map(c => ({ itemId: c.itemId, qty: c.qty, extra: c.extra, comment: c.comment })),
        remark: document.getElementById('remark').value.trim(),
        customFields: orderDetailValues,
      }),
    });
    location.href = '/staff/orders.html';
  } catch (e) { err.textContent = e.message; err.style.display = 'block'; }
}
load();
</script>
